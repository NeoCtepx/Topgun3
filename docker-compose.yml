services:
  selective-conference-api:
    build:
      context: .
      dockerfile: livekit_selective_conference/Dockerfile
    image: selective-conference-api:latest
    container_name: selective-conference-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=*
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  selective-conference-web:
    build:
      context: .
      dockerfile: livekit_web_ui/Dockerfile
    image: selective-conference-web:latest
    container_name: selective-conference-web
    restart: unless-stopped
    depends_on:
      - selective-conference-api
    ports:
      - "8080:80"
